# ----- Oracle Datasource (21c XE) -----
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=ganesh_app
spring.datasource.password=ganesh123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true

# ----- IMPORTANT: Disable SQL init for now -----
spring.sql.init.mode=never

# ----- Server -----
server.port=8080


# ----- Application Custom Properties -----
app.encryption.secret-key=RevSecretKey1234
app.verification-code.expiry-minutes=15
app.password-generator.default-length=16

# ----- Thymeleaf -----
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false