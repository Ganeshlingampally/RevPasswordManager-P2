<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RevPasswordManager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            padding: 0;
            background-color: var(--body-bg);
            background-image: none;
        }

        .auth-split-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, #172554 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .auth-split-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            opacity: 0.5;
        }

        .auth-split-left-content {
            position: relative;
            z-index: 10;
            max-width: 480px;
            text-align: center;
        }

        .auth-split-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: var(--body-bg);
        }

        .auth-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            width: 100%;
            max-width: 460px;
            border: 1px solid var(--border);
        }

        .auth-card h1 {
            text-align: left;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            color: var(--dark);
        }

        .auth-card p {
            text-align: left;
            margin-bottom: 2rem;
            color: var(--text-muted);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .auth-split-left {
                display: none;
            }

            .auth-container {
                justify-content: center;
                padding: 20px;
                background-image: radial-gradient(circle at center, #f3f4f6 0%, #e5e7eb 100%);
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <!-- Left Side: Branding & Illustration -->
        <div class="auth-split-left">
            <div class="auth-split-left-content">
                <div class="brand-logo">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    <span>RevPassManager</span>
                </div>
                <h2 style="color: white; font-size: 2.25rem; font-weight: 700; margin-bottom: 20px; line-height: 1.2;">
                    Secure. Simple. Reliable.</h2>
                <p style="font-size: 1.1rem; color: rgba(255,255,255,0.8); line-height: 1.6;">Access your encrypted
                    vault from anywhere. Your digital life, protected by military-grade encryption.</p>

                <div
                    style="margin-top: 50px; display: inline-block; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.2);">
                    <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.9;">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="auth-split-right">
            <div class="auth-card">
                <h1>Welcome Back</h1>
                <p>Please sign in to access your vault.</p>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <form action="/web/login" method="post">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" class="form-control"
                            placeholder="Enter username" required>
                    </div>
                    <div class="form-group mb-4">
                        <div style="display: flex; justify-content: space-between; align-items: baseline;">
                            <label for="masterPassword">Master Password</label>
                            <a href="/recovery" class="text-muted" style="font-size: 0.8rem;">Forgot password?</a>
                        </div>
                        <input type="password" id="masterPassword" name="masterPassword" class="form-control"
                            placeholder="Enter your master password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block py-3"
                        style="font-size: 1.05rem; font-weight: 600;">Sign In to Vault</button>
                </form>

                <div class="text-center mt-4 pt-4" style="border-top: 1px solid var(--border); font-size: 0.95rem;">
                    Don't have an account? <a href="/register" style="font-weight: 600;">Create one now</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
