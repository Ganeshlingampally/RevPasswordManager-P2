<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Recovery - RevPasswordManager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            padding: 0;
            background-color: var(--body-bg);
            background-image: none;
        }

        .auth-split-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--info) 0%, #0369a1 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .auth-split-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            opacity: 0.5;
        }

        .auth-split-left-content {
            position: relative;
            z-index: 10;
            max-width: 480px;
            text-align: center;
        }

        .auth-split-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: var(--body-bg);
        }

        .auth-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        .auth-card h1 {
            text-align: left;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            color: var(--dark);
        }

        .auth-card p {
            text-align: left;
            margin-bottom: 2rem;
            color: var(--text-muted);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .auth-split-left {
                display: none;
            }

            .auth-container {
                justify-content: center;
                padding: 20px;
                background-image: radial-gradient(circle at center, #f3f4f6 0%, #e5e7eb 100%);
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <!-- Left Side -->
        <div class="auth-split-left">
            <div class="auth-split-left-content">
                <div class="brand-logo">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    <span>RevPassManager</span>
                </div>
                <h2 style="color: white; font-size: 2.25rem; font-weight: 700; margin-bottom: 20px; line-height: 1.2;">
                    Don't panic.</h2>
                <p style="font-size: 1.1rem; color: rgba(255,255,255,0.9); line-height: 1.6;">Recover your vault access
                    using your pre-set security questions. We're here to help you get back inside safely.</p>

                <div
                    style="margin-top: 50px; display: inline-block; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 20px; border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.3);">
                    <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.95;">
                        <path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0">
                        </path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Right Side -->
        <div class="auth-split-right">
            <div class="auth-card">
                <h1>Account Recovery</h1>
                <p id="stepDescription">Enter your username to get started.</p>

                <div id="quickToast" class="alert hidden" style="display: none;"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <!-- Step 1: Username -->
                <div id="step1">
                    <div class="form-group mb-4">
                        <label for="recUsername">Username</label>
                        <input type="text" id="recUsername" class="form-control" required
                            placeholder="Enter your username">
                    </div>
                    <button class="btn btn-primary btn-block py-3" onclick="loadQuestions()"
                        style="font-weight: 600;">Identify Account</button>
                </div>

                <!-- Step 2: Answer Security Questions -->
                <div id="step2" class="hidden" style="display: none;">
                    <div class="alert alert-info py-2 mb-4"
                        style="background:#e0f2fe; border-color:#bae6fd; color:#0369a1;"><small>Answer your security
                            questions exactly as you saved them.</small></div>
                    <div id="questionsArea" class="mb-4"></div>
                    <button class="btn btn-primary btn-block py-3" onclick="verifyAnswers()"
                        style="font-weight: 600;">Verify Answers</button>
                </div>

                <!-- Step 3: OTP -->
                <div id="step3" class="hidden" style="display: none;">
                    <div id="otpMessage" class="alert alert-success mb-4"
                        style="background:#dcfce7; border-color:#bbf7d0; color:#15803d;"></div>
                    <div class="form-group mb-4">
                        <label for="otpCode"
                            style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 8px; text-align: center; display: block;">Enter
                            OTP Code</label>
                        <input type="text" id="otpCode" class="form-control text-center" maxlength="6" required
                            style="font-size: 1.75rem; letter-spacing: 12px; padding: 15px; font-weight: 600; font-family: monospace; border-radius: var(--radius-lg); background: #f8fafc;"
                            placeholder="• • • • • •">
                    </div>
                    <button class="btn btn-primary btn-block py-3" onclick="goToResetStep()"
                        style="font-weight: 600;">Verify OTP</button>
                </div>

                <!-- Step 4: Reset Password -->
                <div id="step4" class="hidden" style="display: none;">
                    <div class="form-group">
                        <label for="newMasterPassword">New Master Password</label>
                        <input type="password" id="newMasterPassword" class="form-control" required
                            placeholder="Enter new strong password">
                    </div>
                    <div class="form-group mb-4">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" required
                            placeholder="Confirm new password">
                    </div>
                    <button class="btn btn-success btn-block py-3" onclick="resetPassword()"
                        style="font-weight: 600;">Reset Password</button>
                </div>

                <div class="text-center mt-4 pt-4" style="border-top: 1px solid var(--border); font-size: 0.95rem;">
                    <a href="/login" class="text-muted" style="display: inline-flex; align-items: center; gap: 5px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
    <script th:inline="javascript">
        let recoveryUsername = '';
        let otpCodeValue = '';

        function showMessage(msg, type) {
            const el = document.getElementById('quickToast');
            el.textContent = msg;
            el.style.display = 'block';
            el.className = `alert alert-${type === 'error' ? 'danger' : 'success'}`;
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        async function loadQuestions() {
            const username = document.getElementById('recUsername').value.trim();
            if (!username) { showMessage('Please enter your username', 'error'); return; }

            try {
                const questions = await apiCall('/api/users/recovery/questions?username=' + encodeURIComponent(username));
                if (!questions || questions.length === 0) {
                    showMessage('No security questions found for this user', 'error');
                    return;
                }

                recoveryUsername = username;
                const area = document.getElementById('questionsArea');
                area.innerHTML = '';
                questions.forEach((q, idx) => {
                    area.innerHTML += `
                        <div class="form-group" style="background:#f8fafc; padding: 15px; border-radius: var(--radius); border: 1px solid var(--border);">
                            <label style="font-weight: 600; color: var(--dark); font-size: 0.95rem;">Q${idx + 1}: <span class="text-muted font-weight-normal">${q.question}</span></label>
                            <input type="password" class="form-control rec-answer mt-2" data-question-id="${q.questionId}" placeholder="Enter your exact answer" required>
                        </div>
                    `;
                });

                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('stepDescription').textContent = 'Answer your security questions to verify identity.';
                showMessage('Security questions loaded.', 'success');
            } catch (e) {
                showMessage(e.message || 'Username not found', 'error');
            }
        }

        async function verifyAnswers() {
            const answerEls = document.querySelectorAll('.rec-answer');
            const securityAnswers = [];

            answerEls.forEach(el => {
                const answer = el.value.trim();
                const questionId = parseInt(el.dataset.questionId);
                if (answer) {
                    securityAnswers.push({ questionId: questionId, answer: answer });
                }
            });

            if (securityAnswers.length < 3) {
                showMessage('Please answer all 3 security questions', 'error');
                return;
            }

            try {
                const result = await apiCall('/api/users/recovery/verify-answers', 'POST', {
                    username: recoveryUsername,
                    securityAnswers: securityAnswers
                });

                document.getElementById('step2').style.display = 'none';
                document.getElementById('step3').style.display = 'block';
                document.getElementById('step3').classList.remove('hidden');
                document.getElementById('otpMessage').textContent = result.message;
                document.getElementById('stepDescription').textContent = 'Final step: Provide OTP.';
                showMessage('Security answers verified.', 'success');
            } catch (e) {
                showMessage(e.message || 'Incorrect security answers', 'error');
            }
        }

        function goToResetStep() {
            const otp = document.getElementById('otpCode').value.trim();
            if (!otp || otp.length !== 6) {
                showMessage('Please enter a valid 6-digit OTP', 'error');
                return;
            }
            otpCodeValue = otp;
            document.getElementById('step3').style.display = 'none';
            document.getElementById('step4').style.display = 'block';
            document.getElementById('step4').classList.remove('hidden');
            document.getElementById('stepDescription').textContent = 'Set your new master password below.';
            document.getElementById('quickToast').style.display = 'none';
        }

        async function resetPassword() {
            const newPassword = document.getElementById('newMasterPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || newPassword.length < 8) {
                showMessage('New password must be at least 8 characters', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            try {
                await apiCall('/api/users/recovery/reset-password', 'POST', {
                    username: recoveryUsername,
                    otpCode: otpCodeValue,
                    newMasterPassword: newPassword
                });

                showMessage('Password reset successful! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = '/login', 2500);
            } catch (e) {
                showMessage(e.message || 'Password reset failed.', 'error');
            }
        }
    </script>
</body>

</html>
