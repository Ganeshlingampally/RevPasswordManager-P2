# ===========================
# Log4J Configuration
# RevPasswordManager P2
# ===========================

# Root Logger
log4j.rootLogger=INFO, console, file

# ----- Console Appender -----
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.Target=System.out
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1} - %m%n

# ----- File Appender -----
log4j.appender.file=org.apache.log4j.RollingFileAppender
log4j.appender.file.File=logs/revpasswordmanager.log
log4j.appender.file.MaxFileSize=10MB
log4j.appender.file.MaxBackupIndex=5
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c - %m%n

# ----- Package-Level Logging -----
log4j.logger.com.revpasswordmanager.app=DEBUG
log4j.logger.org.springframework=WARN
log4j.logger.org.hibernate=WARN
